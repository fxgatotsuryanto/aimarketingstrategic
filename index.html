
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraFlow - AI Business Strategic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3, .font-robot {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.05em;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        @keyframes scaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-scale-up {
            animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .animation-delay-500 { animation-delay: 0.5s; }
        .animation-delay-2000 { animation-delay: 2s; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; width: 210mm; height: 297mm; }
            section { page-break-inside: avoid; border-bottom: 1px solid #eee; margin-bottom: 2rem; padding-bottom: 2rem; }
            .print-full-width { width: 100% !important; max-width: 100% !important; }
            button { display: none !important; }
            .hero-visual { display: none !important; }
            .grid { display: block !important; }
            .card { border: 1px solid #ddd !important; margin-bottom: 1rem !important; }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                        robot: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0B2A4A',
                        secondary: '#F57C00',
                        neutral: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                        }
                    }
                }
            }
        }
    </script>
